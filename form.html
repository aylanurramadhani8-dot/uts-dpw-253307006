<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir — PPDB SMKN 1 Kota Madiun</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="asset/css/style.css">
</head>
<body>

    <header>
        <h1>FORMULIR ONLINE</h1>
        <p>Isi data diri Anda sesuai dokumen asli</p>
    </header>

    <nav>
        <a href="index.html">BERANDA</a>
        <a href="alur.html">ALUR SPMB</a>
        <a href="form.html">FORMULIR</a>
    </nav>

    <main>
        <div class="section-box">
            <h2 class="form-title">Biodata Calon Siswa</h2>
            <hr class="divider">
            
            <form id="ppdbForm">
                <div class="form-group">
                    <label for="nama">Nama Lengkap :</label>
                    <input type="text" id="nama" placeholder="Masukkan nama lengkap sesuai ijazah">
                </div>

                <div class="form-group">
                    <label for="nik">NIK (16 Digit) :</label>
                    <input type="text" id="nik" maxlength="16" placeholder="Masukkan 16 digit NIK">
                </div>

                <div class="form-group">
                    <label for="jalur">Jalur Pendaftaran :</label>
                    <select id="jalur">
                        <option value="">— Pilih Jalur —</option>
                        <option value="Zonasi">Zonasi</option>
                        <option value="Prestasi">Prestasi</option>
                        <option value="Afirmasi">Afirmasi</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="jurusan">Pilihan Jurusan :</label>
                    <select id="jurusan">
                        <option value="">— Pilih Jurusan —</option>
                        <option value="TPM">Teknik Pemesinan (TPM)</option>
                        <option value="TKR">Teknik Kendaraan Ringan (TKR)</option>
                        <option value="TITL">Teknik Instalasi Tenaga Listrik (TITL)</option>
                        <option value="TAV">Teknik Audio Video (TAV)</option>
                        <option value="DPIB">DPIB</option>
                        <option value="GEO">Geomatika</option>
                        <option value="TKP">Teknik Konstruksi & Properti</option>
                    </select>
                </div>

                <div class="button-container">
                    <button type="button" class="btn-submit" onclick="prosesDaftar()">Kirim Pendaftaran</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>© 2026 SMKN 1 Kota Madiun</p>
    </footer>

    <div id="toast"></div>
    <script src="asset/javascript/script.js"></script>

</body>
</html>
